<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PETMATCH</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fdf8ed;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            width: 80%;
            max-width: 1000px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .image-container {
            flex: 1;
            background-image: url('https://thumbs.dreamstime.com/b/foto-vertical-de-um-menino-e-cachorro-brincando-no-quintal-da-casa-o-est%C3%A3o-muito-felizes-em-brincar-juntos-252629992.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 10px 0 0 10px;
        }
        .form-container {
            flex: 1;
            text-align: center;
            padding: 40px;
        }
        .form-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .login-button {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .register-link {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
        }
        .register-link a {
            color: #00aaff;
            text-decoration: none;
        }
    </style>
    <script>
        function redirectToPage() {
            window.location.href = "principal.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="image-container"></div>
        <div class="form-container">
            <h1>Bem-vindos ao PETMATCH</h1>
            <h2>Login</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Senha">
            <button class="login-button" onclick="redirectToPage()">Entrar</button>
            <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </div>
</body>
</html>
